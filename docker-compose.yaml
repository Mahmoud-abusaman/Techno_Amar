services:
  postgres:
    image: postgres:15-alpine
    container_name: techno_amar_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: techno_amar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
